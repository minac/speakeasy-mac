name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm cert.p12

      - name: Install Apple intermediate certificates
        run: |
          curl -sL https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer -o /tmp/DeveloperIDG2CA.cer
          security import /tmp/DeveloperIDG2CA.cer -k build.keychain

      - name: Store notarytool credentials
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_PASSWORD"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build, sign, notarize
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          NOTARY_PROFILE: notarytool-profile
          VERSION: ${{ steps.version.outputs.version }}
        run: ./run.sh release "$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          files: build/release/Speakeasy-${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true

      - name: Update Homebrew Cask
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          DMG="build/release/Speakeasy-${VERSION}.dmg"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/speakeasy.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/speakeasy.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/speakeasy.rb
          git commit -m "chore: update cask to v${VERSION}" || true
          git push origin HEAD:main
